# OpenPBL — production overrides.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file layers on top of docker-compose.yml. It:
#   - pins NODE_ENV=production on the app
#   - adds resource limits (memory + cpus) to the app
#   - ensures postgres + redis restart automatically
#   - starts an Nginx reverse proxy that terminates TLS, proxies /ws to the
#     WebSocket port, and serves long-lived SSE connections with a tuned
#     `proxy_read_timeout`.
#
# TLS certificates are NOT included. Mount them at deploy/certs/ (see the
# nginx volume mounts below) and edit the commented `ssl_certificate` lines
# in deploy/nginx.conf before going live.

services:
  app:
    environment:
      NODE_ENV: production
    # Resource limits cap worst-case memory/CPU usage so a runaway request
    # can't OOM the host. Tune to your instance size.
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
    # Don't publish app ports directly in production — Nginx is the only
    # externally-reachable service. The `3000` and `3001` entries from the
    # base file are overridden to empty (no host port mapping).
    ports: !reset []
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - ./deploy/static:/var/www/openpbl-static:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    # Reload Nginx hourly so rotated TLS certs get picked up without a restart.
    # Adjust cadence to match your cert-renewal window.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  nginx-logs:
    name: openpbl-nginx-logs
