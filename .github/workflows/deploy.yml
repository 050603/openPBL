name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production

# Only one deployment at a time per environment.
concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=${{ github.event.inputs.environment }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    if: ${{ github.event.inputs.environment == 'staging' }}
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.openpbl.example
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render deploy script
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.image-tag }} to staging"
          # Placeholder: replace with actual deploy command (ssh, kubectl, flyctl, vercel, etc.)
          echo "TODO: implement staging deploy"

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    if: ${{ github.event.inputs.environment == 'production' }}
    runs-on: ubuntu-latest
    # `environment: production` requires manual approval in repo settings.
    environment:
      name: production
      url: https://openpbl.example
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render deploy script
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.image-tag }} to production"
          # Placeholder: replace with actual deploy command (ssh, kubectl, flyctl, vercel, etc.)
          echo "TODO: implement production deploy"
