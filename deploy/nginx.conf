# OpenPBL Nginx reverse proxy template.
#
# Mount this file at /etc/nginx/conf.d/default.conf (see docker-compose.prod.yml).
# Customise the upstream names, server_name, and TLS certificate paths before
# going live — search for `TODO` below.
#
# Responsibilities:
#   1. Reverse-proxy HTTP/HTTPS to the Next.js app (app:3000).
#   2. Upgrade /ws to the WebSocket server (app:3001).
#   3. Treat /api/*stream*, /api/openmaic/chat, /api/chat/* as SSE — long
#      proxy_read_timeout, proxy_buffering off.
#   4. Cache static assets aggressively.
#   5. Apply the same security headers as next.config.ts (defense in depth —
#      the app also sets them, but Nginx covers anything served directly).
#   6. Compress text responses with gzip.
#   7. Limit request body to 50 MiB (matches the upload cap in
#      src/app/api/uploads/route.ts).

# Worker connections — Nginx auto-tunes, but bumping this helps under high
# concurrency with many WebSocket connections. Tuned at the `events` block in
# nginx.conf (not here). This file only declares `http`-level `server` blocks.

# Upstream: Next.js app (HTTP server on port 3000).
upstream openpbl_app {
    server app:3000;
    keepalive 32;
}

# Upstream: WebSocket server (port 3001). The realtime module is optional, but
# when present it binds WEBSOCKET_PORT (default 3001) on the same container.
upstream openpbl_ws {
    server app:3001;
    keepalive 16;
}

# Rate-limit zone for the upload endpoint (10 req/s per client IP).
limit_req_zone $binary_remote_addr zone=uploads:10m rate=10r/s;

# Gzip — applied to text responses only.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2
    application/wasm;

# Reasonable client body buffer — anything above goes to disk (slow).
client_body_buffer_size 1m;
# 50 MiB matches the upload cap enforced by the app (Stage 6).
client_max_body_size 50m;
client_header_timeout 30s;
client_body_timeout 60s;
send_timeout 60s;
keepalive_timeout 65s;
server_tokens off;

# WebSocket upgrade map.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Plain HTTP is only kept for ACME challenges and to redirect to HTTPS.
    # Disable the redirect locally by commenting out the `return 301` line.
    location /.well-known/acme-challenge/ {
        root /var/www/openpbl-static;
    }

    # Nginx-level healthcheck used by docker-compose (separate from the app's
    # own /api/health/live) — verifies Nginx itself is up without touching the
    # backend.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # TODO(deploy): set server_name to your real hostname.
    listen 443 ssl;
    http2 on;
    server_name _;

    # TODO(deploy): mount certificates at /etc/nginx/certs/ and uncomment.
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;

    # Security headers — mirror next.config.ts (defense in depth).
    # HSTS only makes sense once HTTPS is enabled; left unconditional so the
    # app stays protected even if the operator forgets to enable TLS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP must be `always` so it's applied to error responses too.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: ws: wss:; frame-src 'self' blob: data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Hide Nginx version + upstream headers that leak info.
    proxy_hide_header X-Powered-By;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_connect_timeout 10s;

    # ----------------------------------------------------------------------
    # Healthcheck endpoint — don't log it, don't rate-limit it.
    # ----------------------------------------------------------------------
    location = /api/health/live {
        access_log off;
        proxy_pass http://openpbl_app;
    }
    location = /api/health/ready {
        access_log off;
        proxy_pass http://openpbl_app;
    }

    # ----------------------------------------------------------------------
    # WebSocket — /ws is the documented realtime path. The Connection header
    # is set via the $connection_upgrade map above so plain HTTP requests to
    # /ws still work as Upgrade-less probes.
    # ----------------------------------------------------------------------
    location /ws {
        proxy_pass http://openpbl_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived tunnels — keep the connection open indefinitely.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ----------------------------------------------------------------------
    # SSE endpoints — disable buffering and bump read timeout so the server
    # can stream events for the full request lifetime (course generation can
    # take several minutes).
    # ----------------------------------------------------------------------
    location ~* ^/api/(.*/stream|openmaic/chat|chat/.*)$ {
        proxy_pass http://openpbl_app;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Don't gzip — SSE streams must reach the client as written.
        gzip off;
        chunked_transfer_encoding on;
    }

    # ----------------------------------------------------------------------
    # Upload endpoint — apply rate limiting (10 r/s, burst 20 per IP).
    # ----------------------------------------------------------------------
    location = /api/uploads {
        limit_req zone=uploads burst=20 nodelay;
        proxy_pass http://openpbl_app;
        client_max_body_size 50m;
    }

    # ----------------------------------------------------------------------
    # Next.js static assets — `_next/static/*` is content-hashed and safe to
    # cache for a year. `/_next/image` uses query params for cache busting so
    # it can also be cached long.
    # ----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://openpbl_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }
    location /_next/image {
        proxy_pass http://openpbl_app;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # ----------------------------------------------------------------------
    # Public folder assets (logos, avatars, fonts, vendor JS). Hashed names
    # where possible; conservative 7d cache for the rest.
    # ----------------------------------------------------------------------
    location ~* \.(?:svg|png|jpg|jpeg|gif|webp|ico|woff|woff2|ttf|otf|eot|css|js|wasm)$ {
        proxy_pass http://openpbl_app;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
    }

    # ----------------------------------------------------------------------
    # Everything else — dynamic app routes, API, SSR.
    # ----------------------------------------------------------------------
    location / {
        proxy_pass http://openpbl_app;
        proxy_read_timeout 60s;
    }
}
